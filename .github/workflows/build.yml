name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows x64 executable'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux x64 deb package'
        required: true
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: false
        type: boolean

env:
  APP_NAME: assignsticker
  APP_VERSION: "1.3.0"

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pystray Pillow requests loguru

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssignSticker-windows-x64
          path: dist/AssignSticker.exe

  build-linux:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "APP_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gir1.2-glib-2.0 \
            gir1.2-ayatanaappindicator3-0.1 \
            gir1.2-webkit2-4.1 \
            pkg-config \
            python3-dev \
            dpkg-dev \
            fakeroot

      - name: Build DEB package
        run: |
          PKG_DIR="build/deb/${APP_NAME}"

          # 目录结构
          mkdir -p "${PKG_DIR}/usr/share/${APP_NAME}"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/DEBIAN"

          # 复制项目文件
          cp main.py "${PKG_DIR}/usr/share/${APP_NAME}/"
          cp -r icons htmls saying desktop_widgets "${PKG_DIR}/usr/share/${APP_NAME}/" 2>/dev/null || true
          cp font.ttf icon.ico introduce banner.png LICENSE README.md "${PKG_DIR}/usr/share/${APP_NAME}/" 2>/dev/null || true
          cp pyproject.toml "${PKG_DIR}/usr/share/${APP_NAME}/"

          # 启动脚本
          cat > "${PKG_DIR}/usr/bin/${APP_NAME}" << 'LAUNCHER'
          #!/bin/bash
          cd /usr/share/assignsticker
          python3 main.py "$@"
          LAUNCHER
          chmod +x "${PKG_DIR}/usr/bin/${APP_NAME}"

          # Desktop Entry
          cat > "${PKG_DIR}/usr/share/applications/${APP_NAME}.desktop" << EOF
          [Desktop Entry]
          Name=AssignSticker
          Comment=Homework Kanban Application
          Exec=${APP_NAME}
          Icon=/usr/share/${APP_NAME}/icon.ico
          Type=Application
          Categories=Education;Office;
          Terminal=false
          EOF

          # Control
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Depends: python3,
                   python3-gi,
                   python3-gi-cairo,
                   python3-pil,
                   python3-requests,
                   gir1.2-gtk-3.0,
                   gir1.2-webkit2-4.1,
                   gir1.2-ayatanaappindicator3-0.1,
                   gir1.2-glib-2.0,
                   libcairo2,
                   libgtk-3-0,
                   libwebkit2gtk-4.1-0
          Maintainer: SECTL <sectl@example.com>
          Description: Homework Showboard Application
           AssignSticker is a homework management and display application.
          EOF

          # postinst: 安装 pip 依赖
          cat > "${PKG_DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          pip3 install pystray loguru pycairo PyGObject 2>/dev/null || true
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          # 打包
          dpkg-deb --build "${PKG_DIR}"
          mv "build/deb/${APP_NAME}.deb" "AssignSticker-${APP_VERSION}-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssignSticker-linux-amd64
          path: AssignSticker-*-linux-amd64.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.create_release))
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}