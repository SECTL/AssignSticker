name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build Windows x64 executable
        required: true
        default: true
        type: boolean
      build_linux:
        description: Build Linux x64 deb package
        required: true
        default: true
        type: boolean
      create_release:
        description: Create GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Release tag for manual run (example: v1.3.1)
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: assignsticker

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Build Windows executable
        run: uv run python build.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssignSticker-windows-x64
          path: dist/AssignSticker.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            VERSION="${{ inputs.release_tag }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            pkg-config \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 \
            python3-gi \
            python3-gi-cairo \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            dpkg-dev

      - name: Build with PyInstaller
        shell: bash
        run: |
          uv sync --frozen
          uv pip install pyinstaller

          cat > assignsticker.spec << 'SPECEOF'
          # -*- mode: python ; coding: utf-8 -*-
          from PyInstaller.building.build_main import Analysis, PYZ, EXE

          block_cipher = None

          datas = [
              ('htmls', 'htmls'),
              ('icons', 'icons'),
              ('saying', 'saying'),
              ('desktop_widgets', 'desktop_widgets'),
              ('homeworktemple', 'homeworktemple'),
              ('font.ttf', '.'),
              ('icon.ico', '.'),
              ('introduce', '.'),
              ('banner.png', '.'),
              ('作业模板YML格式标准.txt', '.'),
          ]

          hiddenimports = [
              'gi',
              'gi.repository',
              'gi.repository.Gtk',
              'gi.repository.Gdk',
              'gi.repository.GObject',
              'gi.repository.GLib',
              'gi.repository.Gio',
              'gi.repository.AyatanaAppIndicator3',
              'cairo',
              'webview',
              'webview.platforms.gtk',
              'pystray',
              'pystray._appindicator',
              'PIL',
              'PIL._imagingtk',
              'PIL._tkinter_finder',
          ]

          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=datas,
              hiddenimports=hiddenimports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.zipfiles,
              a.datas,
              [],
              name='assignsticker',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=False,
              disable_windowed_traceback=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon='icon.ico',
          )
          SPECEOF

          uv run pyinstaller assignsticker.spec

      - name: Build DEB package
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          set -euo pipefail
          PKG="build/deb/${APP_NAME}"

          mkdir -p "${PKG}/opt/${APP_NAME}"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/DEBIAN"

          cp -r dist/assignsticker/* "${PKG}/opt/${APP_NAME}/"

          cat > "${PKG}/usr/bin/${APP_NAME}" <<'LAUNCHEOF'
          #!/bin/bash
          export GI_TYPELIB_PATH=/usr/lib/x86_64-linux-gnu/girepository-1.0
          exec /opt/assignsticker/assignsticker "$@"
          LAUNCHEOF
          chmod +x "${PKG}/usr/bin/${APP_NAME}"

          cat > "${PKG}/usr/share/applications/${APP_NAME}.desktop" <<DESKTOPEOF
          [Desktop Entry]
          Name=AssignSticker
          Comment=Homework Kanban Application
          Exec=${APP_NAME}
          Icon=/opt/${APP_NAME}/icon.ico
          Type=Application
          Categories=Education;Office;
          Terminal=false
          StartupWMClass=assignsticker
          DESKTOPEOF

          SIZE=$(du -sk "${PKG}" | cut -f1)
          cat > "${PKG}/DEBIAN/control" <<CONTROLEOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Installed-Size: ${SIZE}
          Depends: gir1.2-gtk-3.0, gir1.2-webkit2-4.1, libayatana-appindicator3-1, libcairo2, libgtk-3-0, libwebkit2gtk-4.1-0, libgirepository-2.0-0
          Maintainer: SECTL <sectl@example.com>
          Homepage: https://github.com/SECTL/AssignSticker
          Description: Homework Showboard Application
           AssignSticker is a homework management and display application for classroom use.
          CONTROLEOF

          dpkg-deb --root-owner-group --build "${PKG}"
          mv "build/deb/${APP_NAME}.deb" "AssignSticker-${APP_VERSION}-amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssignSticker-linux-amd64
          path: AssignSticker-*-amd64.deb
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.create_release)) &&
      (needs.build-windows.result == 'success' || needs.build-linux.result == 'success') &&
      (needs.build-windows.result != 'failure' && needs.build-linux.result != 'failure')
    steps:
      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            echo "Manual release must provide release_tag (example: v1.3.1)" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: AssignSticker-windows-x64
          path: artifacts/windows

      - name: Download Linux artifact
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: AssignSticker-linux-amd64
          path: artifacts/linux

      - name: List release files
        run: find artifacts -type f || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            artifacts/windows/*
            artifacts/linux/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
