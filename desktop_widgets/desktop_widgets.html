<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssignSticker Widget</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('../font.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'CustomFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .widget-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.18s ease;
        }

        .logo:hover {
            transform: scale(1.03);
        }

        .drag-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 16px;
            cursor: move;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="drag-area"></div>
    <div class="widget-container">
        <img src="widgets.png" alt="Logo" class="logo" id="showLogo">
    </div>

    <script>
        // 拖动功能
        const dragArea = document.querySelector('.drag-area');
        let isDragging = false;
        let startX, startY;

        dragArea.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging && window.pywebview && window.pywebview.api) {
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;
                window.pywebview.api.move_widget(deltaX, deltaY);
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 点击图标显示主窗口
        document.getElementById('showLogo').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.show_main_window();
            }
        });
    </script>
</body>
</html>
