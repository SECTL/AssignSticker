<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssignSticker Widget</title>
    <style>
        @import url('https://cdn.fontsource.org/css/poppins/400/600.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            display: flex;
            padding: 2px;
            font-family: 'Poppins', 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(152, 232, 220, 0.35), transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(120, 200, 255, 0.2), transparent 50%),
                linear-gradient(160deg, #e8f4f6 0%, #e4eef7 100%);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .widget-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            width: 100%;
            height: 100%;
            padding: 3px 4px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow:
                0 1px 4px rgba(60, 120, 140, 0.06),
                0 6px 16px rgba(60, 120, 140, 0.08);
            transition: box-shadow 0.3s ease;
        }

        .widget-container:hover {
            box-shadow:
                0 1px 4px rgba(60, 120, 140, 0.08),
                0 8px 20px rgba(60, 120, 140, 0.12);
        }

        .brand-chip {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            flex: 1;
            height: 100%;
            padding: 0 7px 0 10px;
            border-radius: 7px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .brand-chip::before {
            content: '';
            position: absolute;
            left: 4px;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5cd9c5, #5ab8f0);
            box-shadow: 0 0 0 2px rgba(92, 217, 197, 0.15);
        }

        .logo {
            width: 120px;
            height: 30px;
            object-fit: cover;
            display: block;
            object-position: center;
            transform: scale(1.08);
            transform-origin: center;
        }

        .show-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 100%;
            min-width: 60px;
            padding: 0 9px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #3ac7b3 0%, #3b82f6 100%);
            color: #fff;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.15px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(58, 130, 246, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .show-button::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .show-button:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow: 0 3px 12px rgba(58, 130, 246, 0.38);
        }

        .show-button:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 1px 4px rgba(58, 130, 246, 0.25);
        }

        .button-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .show-button svg {
            width: 6px;
            height: 6px;
            fill: #fff;
        }
    </style>
</head>
<body class="pywebview-drag-region">
    <div class="widget-container">
        <div class="brand-chip">
            <img src="widgets.logo.png" alt="AssignSticker" class="logo">
        </div>
        <button class="show-button" id="showButton">
            <span class="button-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </span>
            显示作业板
        </button>
    </div>

    <script>
        const showButton = document.getElementById('showButton');
        // 显示主窗口按钮
        showButton.addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.show_main_window();
            }
        });
    </script>
</body>
</html>
