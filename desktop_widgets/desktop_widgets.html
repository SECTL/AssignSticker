<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssignSticker Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI Variable', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(152, 232, 220, 0.42), transparent 38%),
                linear-gradient(135deg, rgba(237, 246, 246, 0.98), rgba(232, 239, 247, 0.98));
            padding: 3px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        .widget-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            gap: 6px;
            padding: 4px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(248, 251, 252, 0.92), rgba(242, 247, 250, 0.86));
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow:
                0 8px 18px rgba(34, 69, 88, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        .widget-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.28), transparent 58%);
            pointer-events: none;
        }

        .brand-chip {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            flex: 1;
            height: 100%;
            padding: 0 7px;
            border-radius: 11px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 250, 0.88));
            border: 1px solid rgba(121, 191, 179, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.84),
                0 4px 10px rgba(82, 135, 161, 0.08);
        }

        .brand-chip::before {
            content: '';
            position: absolute;
            left: 7px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #61dcc6, #52b7ff);
            box-shadow: 0 0 0 3px rgba(97, 220, 198, 0.12);
        }

        .logo {
            width: 76px;
            height: 22px;
            margin-left: 5px;
            object-fit: contain;
            display: block;
        }

        .show-button {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 24px;
            padding: 0 9px;
            background: linear-gradient(135deg, #23b39d, #3773ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 8px;
            line-height: 1;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            white-space: nowrap;
            box-shadow: 0 6px 12px rgba(38, 108, 202, 0.24);
        }

        .show-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 14px rgba(38, 108, 202, 0.28);
            filter: saturate(1.05);
        }

        .show-button:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(38, 108, 202, 0.2);
        }

        .show-button .button-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .show-button svg {
            width: 7px;
            height: 7px;
            fill: currentColor;
        }
    </style>
</head>
<body class="pywebview-drag-region">
    <div class="widget-container">
        <div class="brand-chip">
            <img src="widgets.logo.png" alt="AssignSticker" class="logo">
        </div>
        <button class="show-button" id="showButton">
            <span class="button-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 9a4 4 0 1 1 0 8 4 4 0 0 1 0-8Zm0 1.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Zm0-5a10 10 0 0 1 9.7 7.56.75.75 0 1 1-1.45.37 8.5 8.5 0 0 0-16.5 0 .75.75 0 0 1-1.45-.36A10 10 0 0 1 12 5.5Z" fill="currentColor"/>
                </svg>
            </span>
            显示作业板
        </button>
    </div>

    <script>
        const showButton = document.getElementById('showButton');
        // 显示主窗口按钮
        showButton.addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.show_main_window();
            }
        });
    </script>
</body>
</html>
