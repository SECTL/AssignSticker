<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>设置</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('../../font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'CustomFont', sans-serif;
        }

        :root {
            --accent: #2f85f6;
            --bg: #f1f2f5;
            --sidebar: #f7f7f8;
            --panel: #ffffff;
            --line: #dfdfe3;
            --text-main: #1f1f1f;
            --text-sub: #6a6a72;
            --hover: #ececef;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            display: flex;
        }

        .sidebar {
            width: 300px;
            min-width: 280px;
            max-width: 320px;
            background: var(--sidebar);
            border-right: none;
            display: flex;
            flex-direction: column;
            padding: 0 12px 12px;
            gap: 8px;
            border-top-left-radius: 14px;
            border-bottom-left-radius: 14px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 64px;
            padding: 0 14px;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            white-space: nowrap;
        }

        .nav-control {
            display: flex;
            justify-content: flex-start;
            padding: 2px 14px 0;
        }

        .sidebar-toggle-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #595b68;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .sidebar-toggle-btn:hover {
            background: #f3f3f6;
            border-color: #ccccd3;
            transform: translateX(-1px);
        }

        .top-search-box {
            background: #f7f7f8;
            border: 1px solid #d8d8de;
            border-radius: 18px;
            height: 42px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            width: clamp(360px, 72vw, 820px) !important;
            min-width: 360px !important;
            max-width: 820px !important;
            flex: 0 1 auto !important;
            margin: 0 auto !important;
        }

        .top-search-box img {
            width: 16px;
            height: 16px;
            opacity: 0.78;
            filter: none;
        }

        .top-search-box input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 14px;
        }

        .top-search-box input::placeholder {
            color: #8b8b94;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .nav-item {
            width: 100%;
            border: none;
            background: transparent;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--hover);
            transform: translateX(2px);
        }

        .nav-item.active {
            background: #e8f2ff;
            border: 1px solid #c8dcff;
        }

        .nav-item.hidden {
            display: none;
        }

        .nav-item.with-divider {
            margin-bottom: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #d8d8de;
        }

        .nav-item img {
            width: 18px;
            height: 18px;
            opacity: 0.85;
            filter: none;
        }

        .nav-item span {
            font-size: 15px;
            color: #3f3f46;
            font-weight: 500;
        }

        .nav-item.active span {
            color: #1f4ea9;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--panel);
            border-top-left-radius: 12px;
            overflow: hidden;
        }

        .topbar {
            height: 64px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            background: #f6f6f7;
        }

        .content-body {
            flex: 1;
            position: relative;
            padding: 8px;
        }

        .tab-panel {
            width: 100%;
            height: 100%;
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .settings-iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
            background: #ffffff;
        }

        .loading-indicator {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 5;
        }

        body.sidebar-collapsed .sidebar {
            width: 98px;
            min-width: 98px;
            max-width: 98px;
            padding: 0 8px 12px;
        }

        body.sidebar-collapsed .sidebar-title {
            display: block;
            overflow: visible;
            text-overflow: clip;
        }

        body.sidebar-collapsed .nav-item span {
            display: none;
        }

        body.sidebar-collapsed .sidebar-header {
            justify-content: flex-start;
            height: 64px;
            padding: 0 8px;
        }

        body.sidebar-collapsed .nav-control {
            justify-content: center;
            padding: 2px 0 0;
        }

        body.sidebar-collapsed .nav-item {
            justify-content: center;
            padding: 12px 10px;
        }

        body.sidebar-collapsed .sidebar-toggle-btn {
            transform: rotate(180deg);
        }
    </style>
</head>

        </div>

        <div class="nav-list">
            <button class="nav-item active" data-tab="mainset" onclick="switchTab('mainset')">
                <img src="../../icons/icons/settings/home.svg" alt="主要设置">
                <span>主要设置</span>
            </button>
            <button class="nav-item" data-tab="styleset" onclick="switchTab('styleset')">
                <img src="../../icons/icons/settings/style.svg" alt="外观设置">
                <span>外观设置</span>
            </button>
            <button class="nav-item" data-tab="templateset" onclick="switchTab('templateset')">

            <button class="nav-item" data-tab="update" onclick="switchTab('update')">
                <img src="../../icons/icons/settings/update.svg" alt="软件更新">

            </button>
            <button class="nav-item" data-tab="about" onclick="switchTab('about')">
                <img src="../../icons/icons/settings/about.svg" alt="关于">
                <span>关于</span>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div class="top-search-box">
                <img src="../../icons/icons/search.svg" alt="搜索">
                <input id="settingsSearch" type="text" placeholder="搜索应用设置...">
            </div>
        </div>
        <div class="content-body" id="contentBody">
            <div class="loading-indicator" id="loadingIndicator">页面加载中...</div>

            <div class="tab-panel active" data-tab="mainset">

            <div class="tab-panel" data-tab="styleset">

            </div>
            <div class="tab-panel" data-tab="templateset">
                <iframe class="settings-iframe tab-frame" id="frame-templateset"></iframe>
            </div>
            <div class="tab-panel" data-tab="subjectset">
                <iframe class="settings-iframe tab-frame" id="frame-subjectset"></iframe>
            </div>
            <div class="tab-panel" data-tab="update">
                <iframe class="settings-iframe tab-frame" id="frame-update"></iframe>
            </div>
            <div class="tab-panel" data-tab="about">
                <iframe class="settings-iframe tab-frame" id="frame-about"></iframe>
            </div>
        </div>
    </div>

        function markLoading(loading) {
            loadingIndicator.style.opacity = loading ? '1' : '0';
        }

        function getFrameByTab(tab) {
            return document.getElementById(`frame-${tab}`);
        }

        function decodeBundledHtml(tab) {
            const b64 = PAGE_HTML_B64[tab] || '';
            if (!b64) return '';
            const decoded = decodeURIComponent(escape(window.atob(b64)));
            const normalized = decoded.replaceAll('../../', assetBase);
            const meta = PAGE_HEADER_META[tab] || { title: TABS[tab]?.title || '设置', subtitle: '配置项' };
            const headerHtml = `<div class="embedded-page-header search-target" data-search="${meta.title} ${meta.subtitle}"><h1 class="embedded-page-title">${meta.title}</h1><div class="embedded-page-subtitle"><span class="embedded-page-subtitle-dot"></span><span>${meta.subtitle}</span></div></div>`;
            const bodyInjected = normalized.replace(/<body([^>]*)>/i, `<body$1>${headerHtml}`);
            if (bodyInjected.includes('</head>')) {
                return bodyInjected.replace('</head>', `${LIGHT_SUBPAGE_STYLE}</head>`);
            }
            return `${LIGHT_SUBPAGE_STYLE}${bodyInjected}`;
        }

        function mountBundledPages() {
            Object.keys(TABS).forEach((tab) => {
                const frame = getFrameByTab(tab);
                if (!frame) return;
                frame.srcdoc = decodeBundledHtml(tab);
            });
        }

        function switchTab(tabName) {
            const tab = TABS[tabName] ? tabName : 'mainset';
            activeTab = tab;

            document.querySelectorAll('.nav-item').forEach((item) => {
                item.classList.toggle('active', item.dataset.tab === tab);
            });

            localStorage.setItem(TAB_STORAGE_KEY, tab);
            window.location.hash = tab;

            document.querySelectorAll('.tab-panel').forEach((panel) => {
                panel.classList.toggle('active', panel.dataset.tab === tab);
            });

            const frame = getFrameByTab(tab);
            markLoading(!frameLoadedMap.get(tab));
            applySearchToFrame(searchInput.value.trim());
        }

        function applySearchToFrame(query) {
            const frame = getFrameByTab(activeTab);
            if (frame && frame.contentWindow && typeof frame.contentWindow.applySearch === 'function') {
                frame.contentWindow.applySearch(query);
            }
        }

        function applyTabFilter(query) {
            const q = query.toLowerCase();
            let firstVisible = null;

            document.querySelectorAll('.nav-item').forEach((item) => {
                const tab = item.dataset.tab;
                const info = TABS[tab];
                const text = `${info.title} ${info.keywords.join(' ')}`.toLowerCase();
                const matched = !q || text.includes(q);
                item.classList.toggle('hidden', !matched);
                if (matched && !firstVisible) firstVisible = tab;
            });

            if (query && firstVisible && !document.querySelector(`.nav-item[data-tab="${activeTab}"]`)?.classList.contains('hidden')) {
                return;
            }

            if (firstVisible) {
                switchTab(firstVisible);
            }
        }

        function handleSearchInput() {
            const query = searchInput.value.trim();
            applyTabFilter(query);
            applySearchToFrame(query);
        }

        function setSidebarCollapsed(collapsed) {
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            sidebarToggleBtn.title = collapsed ? '展开导航栏' : '收缩导航栏';
            localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed ? '1' : '0');
        }

        function toggleSidebar() {
            const collapsed = !document.body.classList.contains('sidebar-collapsed');
            setSidebarCollapsed(collapsed);
        }

        function initSidebarState() {
            const collapsed = localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === '1';
            setSidebarCollapsed(collapsed);
        }

        function initTab() {
            const hashTab = (window.location.hash || '').replace('#', '').trim();
            const storedTab = localStorage.getItem(TAB_STORAGE_KEY);
            const initialTab = TABS[hashTab] ? hashTab : (TABS[storedTab] ? storedTab : 'mainset');
            switchTab(initialTab);
        }

        function normalizeWidgetEngine(value) {
            return value === 'webview' ? 'webview' : 'qt';
        }

        async function saveWidgetEngine(engine) {
            try {
                if (!(window.pywebview && window.pywebview.api && window.pywebview.api.saveSettings)) {
                    return;
                }
                await window.pywebview.api.saveSettings({ widgetEngine: normalizeWidgetEngine(engine) });
            } catch (error) {
                console.error('保存小组件引擎设置失败:', error);
            }
        }

        function ensureWidgetEngineControlInMainset() {
            const frame = getFrameByTab('mainset');
            const doc = frame && frame.contentDocument;
            if (!doc) return null;

            let card = doc.getElementById('widgetEngineCard');
            if (card) return card;

            const container = doc.querySelector('.settings-container') || doc.body;
            if (!container) return null;

            card = doc.createElement('div');
            card.id = 'widgetEngineCard';
            card.className = 'settings-card search-target';
            card.dataset.search = '小组件 引擎 Qt WebView 推荐 不推荐';
            card.innerHTML = `
                <div class="card-title">小组件引擎</div>
                <div class="setting-item">
                    <div class="setting-info">
                        <div class="setting-label">组件实现方式</div>
                        <div class="setting-desc">切换 Qt 或 WebView 版本的小组件实现。</div>
                    </div>
                    <select id="mainsetWidgetEngineSelect" class="select-box" style="min-width: 220px;">
                        <option value="qt">Qt 小组件（推荐）</option>
                        <option value="webview">WebView 小组件（不推荐）</option>
                    </select>
                </div>
                <div class="setting-item" style="border-bottom: none; padding-top: 10px;">
                    <div id="mainsetWidgetEngineHint" class="setting-desc">切换后下次“隐藏主窗口”时生效。</div>
                </div>
            `;

            const firstCard = container.querySelector('.settings-card');
            if (firstCard && firstCard.nextSibling) {
                container.insertBefore(card, firstCard.nextSibling);
            } else if (firstCard) {
                container.appendChild(card);
            } else {
                container.prepend(card);
            }

            const select = doc.getElementById('mainsetWidgetEngineSelect');
            if (select) {
                select.addEventListener('change', async (event) => {
                    currentWidgetEngine = normalizeWidgetEngine(event.target.value);
                    await saveWidgetEngine(currentWidgetEngine);
                });
            }
            return card;
        }

        async function applyWidgetEngineToMainset() {
            const card = ensureWidgetEngineControlInMainset();
            if (!card) return;

            const frame = getFrameByTab('mainset');
            const doc = frame && frame.contentDocument;
            if (!doc) return;

            const select = doc.getElementById('mainsetWidgetEngineSelect');
            const hint = doc.getElementById('mainsetWidgetEngineHint');
            if (!select || !hint) return;

            if (isMacOS) {
                currentWidgetEngine = 'webview';
                select.value = 'webview';
                select.disabled = true;
                hint.textContent = 'macOS 仅支持 WebView 小组件。';
                await saveWidgetEngine('webview');
            } else {
                select.value = normalizeWidgetEngine(currentWidgetEngine);
                select.disabled = false;
                hint.textContent = '切换后下次“隐藏主窗口”时生效。';
            }
        }

        async function initWidgetEngineSetting() {
            let engine = 'qt';
            try {
                if (window.pywebview && window.pywebview.api && window.pywebview.api.loadSettings) {
                    const result = await window.pywebview.api.loadSettings();
                    if (result && result.success && result.data) {
                        engine = normalizeWidgetEngine(result.data.widgetEngine);
                    }
                }
            } catch (error) {
                console.error('加载小组件引擎设置失败:', error);
            }

            currentWidgetEngine = normalizeWidgetEngine(engine);
            await applyWidgetEngineToMainset();
        }

        document.querySelectorAll('.tab-frame').forEach((frame) => {
            const tab = frame.id.replace('frame-', '');
            frameLoadedMap.set(tab, false);
            frame.addEventListener('load', () => {
                frameLoadedMap.set(tab, true);
                if (tab === 'mainset') {
                    applyWidgetEngineToMainset();
                }
                if (tab === activeTab) {
                    markLoading(false);
                    applySearchToFrame(searchInput.value.trim());
                }
            });
        });

        mountBundledPages();
        searchInput.addEventListener('input', handleSearchInput);
        sidebarToggleBtn.addEventListener('click', toggleSidebar);

        // 关闭设置窗口
        async function closeSettings() {
            try {
                if (window.pywebview && window.pywebview.api && window.pywebview.api.closeSettingsWindow) {
                    await window.pywebview.api.closeSettingsWindow();
                    return;
                }
            } catch (e) {
                console.error('关闭设置窗口失败:', e);
            }
            if (window.parent && window.parent.closeSettingsModal) {
                window.parent.closeSettingsModal();
            } else {
                window.close();
            }
        }

        // 监听主题更新消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'themeUpdated') {
                const theme = event.data.theme;
                if (theme) {
                    document.documentElement.style.setProperty('--primary-color', theme.primary);
                    document.documentElement.style.setProperty('--secondary-color', theme.secondary);
                    document.documentElement.style.setProperty('--accent-color', theme.accent);
                }
            }

            if (event.data && event.data.type === 'zoomUpdated') {
                const zoom = event.data.zoom;
                if (zoom && window.pywebview && window.pywebview.api) {
                    window.pywebview.api.setZoom(zoom);
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSettings();
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        initSidebarState();
        initTab();
        initWidgetEngineSetting();
    </script>
</body>
</html>
