<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('../../font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'CustomFont', sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        .settings-container {
            max-width: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-label {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .setting-desc {
            font-size: 12px;
            color: #999;
        }

        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 更新状态 */
        .update-status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .update-status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
        }

        .update-status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #c62828;
        }

        .update-status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <!-- 软件更新 -->
        <div class="settings-card">
            <div class="card-title">软件更新</div>
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">当前版本</div>
                    <div class="setting-desc">v1.3.0 (Dangerous Star)</div>
                </div>
                <span style="color: #667eea; font-size: 14px;">v1.3.0</span>
            </div>
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">检查更新</div>
                    <div class="setting-desc">检查是否有新版本可用</div>
                </div>
                <button class="btn btn-primary" onclick="checkUpdate()" id="checkBtn">检查更新</button>
            </div>
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">更新日志</div>
                    <div class="setting-desc">查看最近更新内容</div>
                </div>
                <button class="btn btn-secondary" onclick="showChangelog()">查看日志</button>
            </div>
        </div>

        <!-- 更新状态 -->
        <div class="settings-card" id="updateStatusCard" style="display: none;">
            <div class="card-title">更新状态</div>
            <div id="updateStatus" class="update-status info"></div>
        </div>
    </div>

    <script>
        // 页面加载
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('更新页面已加载');
        });

        // 检查更新
        async function checkUpdate() {
            const checkBtn = document.getElementById('checkBtn');
            const updateStatusCard = document.getElementById('updateStatusCard');
            const updateStatus = document.getElementById('updateStatus');

            checkBtn.disabled = true;
            checkBtn.textContent = '检查中...';

            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.checkUpdate();
                    
                    if (result.success) {
                        if (result.isLatest) {
                            updateStatus.className = 'update-status success';
                            updateStatus.innerHTML = `✓ 当前已是最新版本<br><span style="font-size: 12px;">v${result.latestVersion}</span>`;
                        } else {
                            updateStatus.className = 'update-status info';
                            updateStatus.innerHTML = `新版本可用：v${result.latestVersion}<br><span style="font-size: 12px;">点击下载更新</span>`;
                        }
                        updateStatusCard.style.display = 'block';
                    } else {
                        updateStatus.className = 'update-status error';
                        updateStatus.textContent = `检查失败：${result.message}`;
                        updateStatusCard.style.display = 'block';
                    }
                } else {
                    updateStatus.className = 'update-status error';
                    updateStatus.textContent = '更新功能不可用';
                    updateStatusCard.style.display = 'block';
                }
            } catch (error) {
                updateStatus.className = 'update-status error';
                updateStatus.textContent = `检查失败：${error.message}`;
                updateStatusCard.style.display = 'block';
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = '检查更新';
            }
        }

        // 显示更新日志
        async function showChangelog() {
            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.getChangelog();
                    if (result.success) {
                        alert(`更新日志：\n\n${result.changelog}`);
                    } else {
                        alert('无法获取更新日志：' + result.message);
                    }
                }
            } catch (error) {
                console.error('获取更新日志失败:', error);
                alert('获取更新日志失败：' + error.message);
            }
        }

        // 禁用右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
