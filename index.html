<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Wow 伙伴！</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            font-family: 'CustomFont', sans-serif !important;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --primary-strong: #5568d3;
            --primary-soft: rgba(102, 126, 234, 0.12);
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --bg-start: #f8f9ff;
            --bg-end: #eef2ff;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
        }

        .header-container {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .saying-container {
                width: 100%;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            #dateDisplay {
                font-size: 12px;
            }

            .saying-text {
                font-size: 14px;
            }
        }

        .saying-container {
            width: 400px;
            text-align: right;
            padding: 20px;
        }

        .footer-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }

        .saying-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .saying-text.fade-out {
            opacity: 0;
        }

        .saying-from {
            font-size: 14px;
            color: #666;
            font-style: italic;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .saying-from.fade-out {
            opacity: 0;
        }

        .time-date-container {
            margin-left: 20px;
            padding-top: 15px;
        }

        h1 {
            color: var(--primary-strong);
            margin: 0;
            font-size: 37px;
        }

        #timeDisplay {
            color: #000;
        }

        #dateDisplay {
            color: #000;
            margin: 2px 0 0 0;
            font-size: 15px;
            text-align: left;
        }

        /* 浮动工具栏 */
        .floating-toolbar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 6px;
            position: relative;
        }

        .toolbar-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(1.1);
        }

        .toolbar-btn.primary {
            background: var(--primary-color);
        }

        .toolbar-btn.primary:hover {
            background: var(--primary-strong);
            transform: scale(1.1);
        }

        .toolbar-btn.primary img {
            opacity: 1;
            filter: brightness(0) invert(1);
        }

        .toolbar-btn img {
            width: 22px;
            height: 22px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .toolbar-btn:hover img {
            opacity: 1;
        }

        /* 工具提示 */
        .toolbar-btn::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1001;
        }

        .toolbar-btn:hover::before {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 4px;
        }

        .zoom-display {
            font-size: 14px;
            color: #666;
            min-width: 50px;
            text-align: center;
            user-select: none;
        }

        /* 子菜单 */
        .submenu-container {
            position: relative;
        }

        .submenu {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 160px;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .submenu.show {
            display: flex;
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .submenu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            text-align: left;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .submenu-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .submenu-item img {
            width: 18px;
            height: 18px;
            opacity: 0.7;
        }

        /* 右下角提醒卡片 */
        .toast-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-card {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 400px;
            animation: toastSlideIn 0.3s ease;
            border-left: 4px solid var(--primary-color);
        }

        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        .toast-card.hide {
            animation: toastSlideOut 0.3s ease forwards;
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .toast-message {
            font-size: 13px;
            color: #666;
        }

        /* 作业编辑弹窗 iframe */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-iframe {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            border: none;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }

        /* 作业卡片区域 */
        .homework-container {
            position: fixed;
            top: 120px;
            left: 15px;
            right: 20px;
            bottom: 100px;
            overflow-y: auto;
            padding: 20px;
            z-index: 100;
            transition: top 0.3s, bottom 0.3s;
        }

        .homework-container.fullscreen {
            top: 0;
            bottom: 80px;
        }

        .homework-grid {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0;
            width: 100%;
            max-height: calc(100vh - 220px);
            align-content: flex-start;
        }

        .homework-card {
            width: 300px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
            border: 1px solid var(--primary-soft);
            break-inside: avoid;
        }

        .homework-grid:empty::before {
            content: "暂无作业，点击下方的\"新建作业\"按钮添加";
            white-space: pre-wrap;
            text-align: center;
            font-size: 16px;
            color: var(--primary-strong);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding-top: 66px;
            background: url('icons/icons/noh.svg') no-repeat center top;
            background-size: 48px 48px;
        }

        .homework-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .card-subject {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .homework-item {
            position: relative;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 60px;
        }

        .homework-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .item-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            flex: 1;
        }

        .item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }

        .item-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--primary-soft);
            border-radius: 10px;
            color: var(--primary-strong);
        }

        .item-actions {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: white;
            padding-left: 10px;
        }

        .homework-item:hover .item-actions {
            opacity: 1;
        }

        .item-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .item-btn:hover {
            background: var(--primary-soft);
        }

        .item-btn img {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }

        .item-btn:hover img {
            opacity: 1;
        }

        .item-date {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state img {
            width: 80px;
            height: 80px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="time-date-container">
            <h1 id="timeDisplay">Wow 伙伴！</h1>
            <div id="dateDisplay"></div>
        </div>

        <div class="saying-container">
            <div class="saying-text" id="sayingText"></div>
            <div class="saying-from" id="sayingFrom"></div>
        </div>
    </div>

    <div class="footer-info">
        <div>开发中画面，不代表最终效果</div>
        <div>AssignSticker 1.3.0-Dangerous Star (debug)</div>
    </div>

    <!-- 作业卡片展示区域 -->
    <div class="homework-container" id="homeworkContainer">
        <div class="homework-grid" id="homeworkGrid">
            <!-- 作业卡片将在这里动态生成 -->
        </div>
    </div>

    <!-- 作业编辑弹窗 -->
    <div class="modal-overlay" id="homeworkModal">
        <iframe class="modal-iframe" id="homeworkIframe" src="htmls/more/homework_modal.html"></iframe>
    </div>

    <!-- 浮动工具栏 -->
    <div class="floating-toolbar" id="floatingToolbar">
        <!-- 新建作业 -->
        <button class="toolbar-btn primary" data-tooltip="新建作业" onclick="openHomeworkModal()">
            <img src="icons/icons/add.svg" alt="新建">
        </button>

        <!-- 保存 -->
        <div class="submenu-container">
            <button class="toolbar-btn" data-tooltip="保存" onclick="toggleSubmenu('save-submenu')">
                <img src="icons/icons/save.svg" alt="保存">
            </button>
            <div class="submenu" id="save-submenu">
                <button class="submenu-item">
                    <img src="icons/icons/image.svg" alt="图片">
                    <span>保存为图片</span>
                </button>
                <button class="submenu-item" onclick="saveHomeworkToFile()">
                    <img src="icons/icons/save.svg" alt="保存">
                    <span>手动保存作业</span>
                </button>
            </div>
        </div>

        <!-- 全屏 -->
        <button class="toolbar-btn" data-tooltip="全屏" onclick="toggleFullscreen()">
            <img src="icons/icons/fullscreen.svg" alt="全屏">
        </button>

        <!-- 隐藏 -->
        <button class="toolbar-btn" data-tooltip="隐藏" onclick="hideMainWindow()">
            <img src="icons/icons/hide.svg" alt="隐藏">
        </button>

        <div class="toolbar-divider"></div>

        <!-- 缩小 -->
        <button class="toolbar-btn" data-tooltip="缩小" onclick="zoomOut()">
            <img src="icons/icons/minimize.svg" alt="缩小">
        </button>

        <!-- 显示比例 -->
        <span class="zoom-display">100%</span>

        <!-- 放大 -->
        <button class="toolbar-btn" data-tooltip="放大" onclick="zoomIn()">
            <img src="icons/icons/maximize.svg" alt="放大">
        </button>

        <div class="toolbar-divider"></div>

        <!-- 锁定 -->
        <button class="toolbar-btn" data-tooltip="锁定">
            <img src="icons/icons/lock.svg" alt="锁定">
        </button>

        <!-- 设置 -->
        <button class="toolbar-btn" data-tooltip="设置" onclick="openSettings()">
            <img src="icons/icons/settings.svg" alt="设置">
        </button>

        <!-- 退出 -->
        <button class="toolbar-btn" data-tooltip="退出" onclick="exitApp()">
            <img src="icons/icons/exit.svg" alt="退出">
        </button>

        <!-- 重启 -->
        <button class="toolbar-btn" data-tooltip="重启" onclick="restartApp()">
            <img src="icons/icons/restart.svg" alt="重启">
        </button>
    </div>

    <!-- 右下角提醒卡片 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[now.getDay()];
            const dateString = `${year}年${month}月${day}日 ${weekDay}`;
            document.getElementById('dateDisplay').textContent = dateString;
        }

        // 初始化显示时间和日期
        updateTime();
        updateDate();

        // 加载一言（带淡入淡出效果）
        function loadSaying() {
            const sayingText = document.getElementById('sayingText');
            const sayingFrom = document.getElementById('sayingFrom');

            // 淡出
            sayingText.classList.add('fade-out');
            sayingFrom.classList.add('fade-out');

            // 等待淡出完成后加载新内容
            setTimeout(() => {
                fetch('saying/saying_sc.json')
                    .then(response => response.json())
                    .then(data => {
                        const sayings = data.sayings;
                        const randomIndex = Math.floor(Math.random() * sayings.length);
                        const randomSaying = sayings[randomIndex];
                        sayingText.textContent = randomSaying.text;
                        sayingFrom.textContent = randomSaying.from;

                        // 淡入
                        sayingText.classList.remove('fade-out');
                        sayingFrom.classList.remove('fade-out');
                    })
                    .catch(error => {
                        console.error('加载一言失败:', error);
                        // 出错时也恢复显示
                        sayingText.classList.remove('fade-out');
                        sayingFrom.classList.remove('fade-out');
                    });
            }, 500); // 等待500ms淡出动画完成
        }

        // 初始化加载一言
        loadSaying();

        // 每秒更新一次时间
        setInterval(updateTime, 1000);

        // 每30秒切换一次一言
        setInterval(loadSaying, 30000);

        // 子菜单切换功能
        function toggleSubmenu(submenuId) {
            const submenu = document.getElementById(submenuId);
            const isShowing = submenu.classList.contains('show');

            // 关闭所有子菜单
            document.querySelectorAll('.submenu').forEach(menu => {
                menu.classList.remove('show');
            });

            // 如果当前菜单未显示，则显示它
            if (!isShowing) {
                submenu.classList.add('show');
            }
        }

        // 点击其他地方关闭子菜单
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.submenu-container')) {
                document.querySelectorAll('.submenu').forEach(menu => {
                    menu.classList.remove('show');
                });
            }
        });

        // 作业编辑弹窗功能
        function openHomeworkModal() {
            const iframe = document.getElementById('homeworkIframe');
            if (iframe.contentWindow && iframe.contentWindow.resetToCreateMode) {
                iframe.contentWindow.resetToCreateMode();
            }
            document.getElementById('homeworkModal').classList.add('show');
        }

        function openEditHomeworkModal(id) {
            const homeworkList = getHomeworkList();
            const homework = homeworkList.find(h => h.id === id);
            if (!homework) {
                alert('作业不存在');
                return;
            }

            const iframe = document.getElementById('homeworkIframe');
            if (iframe.contentWindow && iframe.contentWindow.loadHomeworkForEdit) {
                iframe.contentWindow.loadHomeworkForEdit(homework);
            }
            document.getElementById('homeworkModal').classList.add('show');
        }

        function closeHomeworkModal() {
            document.getElementById('homeworkModal').classList.remove('show');
            // 重置 iframe 中的表单
            const iframe = document.getElementById('homeworkIframe');
            if (iframe.contentWindow && iframe.contentWindow.resetHomeworkForm) {
                iframe.contentWindow.resetHomeworkForm();
            }
        }

        // 设置窗口功能
        async function openSettings() {
            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.openSettingsWindow();
                    if (!result.success) {
                        console.error('打开设置窗口失败:', result.message);
                    }
                } else {
                    console.error('API 不可用');
                }
            } catch (error) {
                console.error('打开设置窗口出错:', error);
            }
        }

        // 供 iframe 调用的回调函数
        function onHomeworkSaved(homeworkData) {
            console.log('作业已保存:', homeworkData);
            // 保存到本地存储
            saveHomework(homeworkData);
            // 刷新显示
            renderHomeworkCards();
            syncHomeworkDataToServer();
            closeHomeworkModal();
        }

        // 作业数据管理
        // 作业数据缓存
        let homeworkCache = null;

        // 从服务器加载作业数据
        async function loadHomeworkFromServer() {
            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.loadHomeworkData();
                    if (result.success) {
                        homeworkCache = result.data || [];
                        // 同步到 localStorage
                        localStorage.setItem('homeworkList', JSON.stringify(homeworkCache));
                        return homeworkCache;
                    }
                }
            } catch (error) {
                console.error('从服务器加载作业失败:', error);
            }
            // 如果服务器加载失败，从 localStorage 加载
            const data = localStorage.getItem('homeworkList');
            homeworkCache = data ? JSON.parse(data) : [];
            return homeworkCache;
        }

        function getHomeworkList() {
            // 如果有缓存，返回缓存
            if (homeworkCache !== null) {
                return homeworkCache;
            }
            // 否则从 localStorage 加载
            const data = localStorage.getItem('homeworkList');
            return data ? JSON.parse(data) : [];
        }

        function saveHomework(homeworkData) {
            const list = getHomeworkList();
            
            // 如果是编辑模式（有id），更新原有作业
            if (homeworkData.id) {
                const index = list.findIndex(h => h.id === homeworkData.id);
                if (index !== -1) {
                    list[index] = {
                        ...list[index],
                        ...homeworkData,
                        updatedAt: new Date().toISOString()
                    };
                }
            } else {
                // 新建模式
                const homework = {
                    id: Date.now(),
                    ...homeworkData,
                    createdAt: new Date().toISOString()
                };
                list.push(homework);
            }
            
            localStorage.setItem('homeworkList', JSON.stringify(list));
            homeworkCache = list;
        }

        function deleteHomework(id) {
            const list = getHomeworkList();

        function updateZoomDisplay() {

        // 自动保存作业
        function startAutoSave() {
            // 根据设置决定自动保存间隔
            const intervalMap = {
                '3分钟': 3 * 60 * 1000,
                '5分钟': 5 * 60 * 1000,
                '10分钟': 10 * 60 * 1000,
                '15分钟': 15 * 60 * 1000
            };
            
            const interval = intervalMap[appSettings.autoSaveInterval] || 5 * 60 * 1000;
            
            setInterval(async () => {

        // 检查作业提醒
        function checkHomeworkReminders() {

            }
        }

        // 每5分钟检查一次作业提醒
        setInterval(checkHomeworkReminders, 5 * 60 * 1000);

        function escapeHtml(text) {
            return (text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function sanitizeRichText(input) {
            const allowedTags = new Set(['B', 'STRONG', 'U', 'S', 'STRIKE', 'DEL', 'BR', 'DIV', 'P']);
            const source = input || '';
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${source}</div>`, 'text/html');
            const root = doc.body.firstElementChild;

            function walk(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return escapeHtml(node.textContent || '');
                }
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }

                const tag = node.tagName.toUpperCase();
                const children = Array.from(node.childNodes).map(walk).join('');

                if (tag === 'BR') return '<br>';
                if (!allowedTags.has(tag)) return children;
                if (tag === 'STRIKE' || tag === 'DEL') return `<s>${children}</s>`;
                if (tag === 'DIV' || tag === 'P') return `${children}<br>`;
                if (tag === 'B') return `<strong>${children}</strong>`;
                return `<${tag.toLowerCase()}>${children}</${tag.toLowerCase()}>`;
            }

            return Array.from(root.childNodes)
                .map(walk)
                .join('')
                .replace(/(<br>\s*){3,}/g, '<br><br>')
                .replace(/^(<br>\s*)+|(<br>\s*)+$/g, '');
        }

        function normalizeContentText(text) {
            return escapeHtml(text || '').replace(/\n/g, '<br>');
        }

        function formatHomeworkContent(homework) {
            const type = homework.type || '';
            
            if (type === '练习册' && homework.templateBodyData) {
                const startPage = homework.templateBodyData['开始页']?.value || homework.startPage || '';
                const endPage = homework.templateBodyData['结束页']?.value || homework.endPage || '';
                const noteInfo = homework.templateBodyData['备注'];
                const note = noteInfo?.value || '';
                const noteHtml = noteInfo?.html || '';
                
                let result = `练习册 ${startPage}-${endPage}`;
                if (note) {
                    const noteRich = noteHtml ? sanitizeRichText(noteHtml) : normalizeContentText(note);
                    result += ` ${noteRich}`;
                }
                return result;
            } else if (type === '预习' && homework.templateBodyData) {
                const previewInfo = homework.templateBodyData['预习内容'];
                const previewContent = previewInfo?.value || '';
                const previewHtml = previewInfo?.html || '';
                const noteInfo = homework.templateBodyData['备注'];
                const note = noteInfo?.value || '';
                const noteHtml = noteInfo?.html || '';
                
                const rich = previewHtml ? sanitizeRichText(previewHtml) : normalizeContentText(previewContent);
                let result = `预习 ${rich}`;
                if (note) {
                    const noteRich = noteHtml ? sanitizeRichText(noteHtml) : normalizeContentText(note);
                    result += ` ${noteRich}`;
                }
                return result;
            } else if ((type === '自定义作业' || type === '作业') && homework.templateBodyData) {
                const contentInfo = homework.templateBodyData['作业内容'];
                const content = contentInfo?.value || '';
                const contentHtml = contentInfo?.html || '';
                
                if (contentHtml) {
                    return sanitizeRichText(contentHtml);
                }
                return normalizeContentText(content);
            }

            if (homework.templateBodyData && typeof homework.templateBodyData === 'object') {
                const lines = Object.entries(homework.templateBodyData).map(([label, info]) => {
                    const ui = String(info?.ui || '').toLowerCase();
                    const value = info?.value || '';
                    const html = info?.html || '';
                    const rendered = ui === 'rtftextbox'
                        ? sanitizeRichText(html || normalizeContentText(value))
                        : normalizeContentText(value);
                    return `${escapeHtml(label)}: ${rendered}`;
                }).filter(Boolean);
                if (lines.length > 0) {
                    return lines.join('<br>');
                }
            }

            if (type === '练习册') {
                const startPage = homework['开始页'] || homework.startPage || '';
                const endPage = homework['结束页'] || homework.endPage || '';
                const note = homework['备注'] || homework.workbookNote || '';
                
                let result = `练习册 ${startPage}-${endPage}`;
                if (note) {
                    const noteRich = homework.workbookNoteHtml
                        ? sanitizeRichText(homework.workbookNoteHtml)
                        : normalizeContentText(note);
                    result += ` ${noteRich}`;
                }
                return result;
            } else if (type === '预习') {
                const previewContent = homework['预习内容'] || homework.previewContent || '';
                const note = homework['备注'] || '';
                const rich = homework.previewContentHtml
                    ? sanitizeRichText(homework.previewContentHtml)
                    : normalizeContentText(previewContent);
                
                let result = `预习 ${rich}`;
                if (note) {
                    const noteRich = homework.previewNoteHtml
                        ? sanitizeRichText(homework.previewNoteHtml)
                        : normalizeContentText(note);
                    result += ` ${noteRich}`;
                }
                return result;
            } else if (type === '自定义作业' || type === '作业') {
                const content = homework['作业内容'] || homework.homeworkContent || '';
                if (homework.homeworkContentHtml) {
                    return sanitizeRichText(homework.homeworkContentHtml);
                }
                return normalizeContentText(content);
            }
            return '';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${month}月${day}日`;
        }

        function renderHomeworkCards() {
            const grid = document.getElementById('homeworkGrid');
            const homeworkList = getHomeworkList();

            if (homeworkList.length === 0) {
                grid.innerHTML = '';
                return;
            }

            // 按学科分组
            const grouped = {};
            homeworkList.forEach(homework => {
                if (!grouped[homework.subject]) {
                    grouped[homework.subject] = [];
                }
                grouped[homework.subject].push(homework);
            });

            // 渲染分组卡片
            grid.innerHTML = Object.entries(grouped).map(([subject, items]) => {
                const itemsHtml = items.map(homework => {
                    const content = formatHomeworkContent(homework);
                    const endDate = formatDate(homework.endTime);
                    const tagsHtml = homework.tags.map(tag => `<span class="item-tag">${tag}</span>`).join('');

                    return `
                        <div class="homework-item" data-id="${homework.id}">
                            <div class="item-header">
                                <div class="item-content">${content}</div>
                                <div class="item-tags">${tagsHtml}</div>
                            </div>
                            <div class="item-date">截止: ${endDate}</div>
                            <div class="item-actions">
                                <button class="item-btn" onclick="editHomework(${homework.id})" title="编辑">
                                    <img src="icons/icons/edit.svg" alt="编辑">
                                </button>
                                <button class="item-btn" onclick="deleteHomework(${homework.id})" title="删除">
                                    <img src="icons/icons/minimize.svg" alt="删除">
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="homework-card">
                        <div class="card-subject">${subject}</div>
                        ${itemsHtml}
                    </div>
                `;
            }).join('');
        }

        function editHomework(id) {
            openEditHomeworkModal(id);
        }

        // 设置管理
        let appSettings = {
            theme: 'blue',
            fontSize: 14,
            opacity: 100,
            glassEffect: false,
            showSaying: true,
            showSeconds: true,
            toolbarPosition: 'center',
            enableAnimation: true,
            animationSpeed: 'normal',
            autoStart: false,
            startMinimized: false,
            enableReminder: true,
            reminderTime: '30分钟',
            autoSaveInterval: '5分钟'
        };

        // 自动保存定时器
        let autoSaveTimer = null;

        // 加载设置
        async function loadAppSettings() {
            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.loadSettings();
                    if (result.success && result.data) {
                        appSettings = { ...appSettings, ...result.data };
                        applySettings();
                    }
                }
            } catch (error) {
                console.error('加载设置失败:', error);
            }
        }

        // 应用设置
        function applySettings() {
            // 应用主题
            applyTheme(appSettings.theme);

            // 应用字体大小
            document.documentElement.style.fontSize = appSettings.fontSize + 'px';

            // 应用窗口透明度
            document.body.style.opacity = appSettings.opacity / 100;

            // 应用毛玻璃效果
            if (appSettings.glassEffect) {
                document.body.style.backdropFilter = 'blur(10px)';
            } else {
                document.body.style.backdropFilter = 'none';
            }

            // 一言固定显示（不再受设置开关影响）
            const sayingContainer = document.querySelector('.saying-container');
            if (sayingContainer) {
                sayingContainer.style.display = 'block';
            }

            // 应用动画设置
            const allElements = document.querySelectorAll('*');
            allElements.forEach(el => {
                if (!appSettings.enableAnimation) {
                    el.style.transition = 'none';
                } else {
                    el.style.transition = '';
                }
            });

            // 应用浮动工具栏位置
            const toolbar = document.getElementById('floatingToolbar');
            if (toolbar) {
                toolbar.style.left = '';
                toolbar.style.right = '';
                toolbar.style.transform = '';

                switch (appSettings.toolbarPosition) {
                    case 'left':
                        toolbar.style.left = '20px';
                        toolbar.style.transform = 'none';
                        break;
                    case 'right':
                        toolbar.style.right = '20px';
                        toolbar.style.left = 'auto';
                        toolbar.style.transform = 'none';
                        break;
                    default: // center
                        toolbar.style.left = '50%';
                        toolbar.style.transform = 'translateX(-50%)';
                        break;
                }
            }

            // 应用缩放
            if (typeof appSettings.zoom === 'number') {
                currentZoom = appSettings.zoom;
                updateZoomDisplay();
                document.body.style.zoom = currentZoom + '%';
            }

            // 设置自动保存定时器
            setupAutoSave();
        }

        // 应用主题
        function applyTheme(theme) {
            const themes = {
                blue: {
                    primary: '#667eea',
                    strong: '#5568d3',
                    soft: 'rgba(102, 126, 234, 0.12)',
                    secondary: '#764ba2',
                    accent: '#f093fb',
                    bgStart: '#f8f9ff',
                    bgEnd: '#eef2ff'
                },
                green: {
                    primary: '#11998e',
                    strong: '#0f857b',
                    soft: 'rgba(17, 153, 142, 0.12)',
                    secondary: '#38ef7d',
                    accent: '#00d2ff',
                    bgStart: '#f3fbf9',
                    bgEnd: '#e8f7f3'
                },
                orange: {
                    primary: '#f5576c',
                    strong: '#e6465e',
                    soft: 'rgba(245, 87, 108, 0.14)',
                    secondary: '#f093fb',
                    accent: '#ffd89b',
                    bgStart: '#fff7f7',
                    bgEnd: '#fff0eb'
                },
                dark: {
                    primary: '#5a5a5a',
                    strong: '#3f3f3f',
                    soft: 'rgba(90, 90, 90, 0.16)',
                    secondary: '#000000',
                    accent: '#666666',
                    bgStart: '#f3f3f3',
                    bgEnd: '#e7e7e7'
                }
            };

            const selectedTheme = themes[theme] || themes.blue;
            document.documentElement.style.setProperty('--primary-color', selectedTheme.primary);
            document.documentElement.style.setProperty('--primary-strong', selectedTheme.strong);
            document.documentElement.style.setProperty('--primary-soft', selectedTheme.soft);
            document.documentElement.style.setProperty('--secondary-color', selectedTheme.secondary);
            document.documentElement.style.setProperty('--accent-color', selectedTheme.accent);
            document.documentElement.style.setProperty('--bg-start', selectedTheme.bgStart);
            document.documentElement.style.setProperty('--bg-end', selectedTheme.bgEnd);
        }

        // 设置自动保存定时器
        function setupAutoSave() {
            // 清除现有定时器
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }

            // 解析自动保存间隔
            const intervalMap = {
                '3分钟': 3 * 60 * 1000,
                '5分钟': 5 * 60 * 1000,
                '10分钟': 10 * 60 * 1000,
                '15分钟': 15 * 60 * 1000
            };
            const interval = intervalMap[appSettings.autoSaveInterval] || 5 * 60 * 1000;

            // 设置新的定时器
            autoSaveTimer = setInterval(async () => {
                await autoSaveHomework();
            }, interval);

            console.log(`自动保存已设置，间隔: ${appSettings.autoSaveInterval}`);
        }

        // 自动保存作业
        async function autoSaveHomework() {
            try {
                const homeworkList = getHomeworkList();
                if (homeworkList.length === 0) return;

                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.saveHomeworkToAutoSave(homeworkList);
                    if (result.success) {
                        console.log('自动保存成功:', result.message);
                    }
                }
            } catch (error) {
                console.error('自动保存失败:', error);
            }
        }

        // 本地浏览器通知（备用）
        function checkHomeworkRemindersLocal() {
            if (!appSettings.enableReminder) return;

            const homeworkList = getHomeworkList();
            const now = new Date();

            // 解析提醒时间
            const reminderMap = {
                '15分钟': 15 * 60 * 1000,
                '30分钟': 30 * 60 * 1000,
                '1小时': 60 * 60 * 1000,
                '2小时': 2 * 60 * 60 * 1000,
                '1天': 24 * 60 * 60 * 1000
            };
            const reminderMs = reminderMap[appSettings.reminderTime] || 30 * 60 * 1000;

            homeworkList.forEach(homework => {
                if (homework.endTime) {
                    const endTime = new Date(homework.endTime);
                    const timeDiff = endTime - now;

                    // 如果作业即将到期（在提醒时间内）且未过期
                    if (timeDiff > 0 && timeDiff <= reminderMs) {
                        showNotification(`作业提醒`, `${homework.subject}: ${homework.content} 即将截止！`);
                    }
                }
            });
        }

        // 显示通知
        function showNotification(title, message) {
            // 使用浏览器通知API
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    new Notification(title, { body: message });
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            new Notification(title, { body: message });
                        }
                    });
                }
            }

            // 同时显示toast提示
            showToast(title, message);
        }

        // 启动时最小化检查
        function checkStartMinimized() {
            if (appSettings.startMinimized) {
                // 延迟执行，确保窗口已创建
                setTimeout(() => {
                    if (window.pywebview && window.pywebview.api) {
                        window.pywebview.api.minimizeWindow();
                    }
                }, 1000);
            }
        }

        // 保存设置
        async function saveAppSettings() {
            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.saveSettings(appSettings);
                    if (result.success) {
                        console.log('设置已保存');
                    }
                }
            } catch (error) {
                console.error('保存设置失败:', error);
            }
        }

        // 监听来自设置窗口的消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'settingsUpdated') {
                appSettings = { ...appSettings, ...event.data.settings };
                applySettings();
                saveAppSettings();
            }
        });

        // 给 Python 侧调用：实时下发设置并立即生效
        window.applySettingsFromBackend = function(settings) {
            if (!settings || typeof settings !== 'object') return;
            appSettings = { ...appSettings, ...settings };
            applySettings();
        };

        // 初始化
        async function init() {
            await loadAppSettings();
            await loadHomeworkFromServer();
            renderHomeworkCards();
        }
        init();

        // 点击弹窗外部关闭
        document.getElementById('homeworkModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeHomeworkModal();
            }
        });

        // 禁用右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 全屏切换功能
        function toggleFullscreen() {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.toggleFullscreen();
            }
        }
    </script>
